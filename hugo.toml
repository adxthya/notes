title = "Blogs"
baseURL = "https://adxthya.vercel.app"
languageCode = "en-in"
defaultContentLanguage = "en-in"
enableEmoji = true
ignoreErrors = ["additional-script-loading-error"]
theme = "hugo-blog-awesome"

[services]
  [services.googleAnalytics]
    id = ""
  [services.disqus]
    shortname = ""

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[Languages.en-in]
languageName = "English"
languageCode = "en-in"
contentDir = "content/en"
weight = 1

[menu]
  [[menu.main]]
    pageRef="/"
    name = 'Home'
    url = '/'
    weight = 10

  [[menu.main]]
    pageRef="posts"
    name = 'Posts'
    url = '/posts/'
    weight = 20

  [[menu.main]]
    pageRef="about"
    name = 'About'
    url = '/about/'
    weight = 30

[Languages.en-in.params]
  sitename = "adxthya's notes"
  defaultColor = "dark"
  description = "A collection of adxthya's notes."
  mainSections = ["posts"]
  toc = false
  tocOpen = false
  goToTop = true
  additionalScripts = ["js/custom.js", "js/custom-2.js"]
  dateFormat = ""
  rssFeedDescription = "summary"

  [Languages.en-in.params.author]
    avatar = "avatar.jpg"
    intro = "Adxthya's Thoughts"
    name = "Adithya K B"
    description = "My Personal Notes"

  [Languages.en-in.params.webmanifest]
    name = "adxthya's notes"
    short_name = "adxthya's name"
    start_url = "/"
    theme_color = "#434648"
    background_color = "#fff"
    display = "standalone"

[params.browserconfig]
TileColor = "#2d89ef"

[[params.socialIcons]]
name = "github"
url = "https://github.com/adxthya"

[[params.socialIcons]]
name = "twitter"
url = "https://twitter.com/adxthyax"

[caches]
  [caches.images]
  dir = ":cacheDir/images"
